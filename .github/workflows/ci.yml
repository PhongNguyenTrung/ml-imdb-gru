name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint: pre-commit (ruff + black + standard hooks) on all files.
  # Cheap (~30s) — fail-fast before spinning up the heavier test job.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Tests: pytest with coverage on a matrix of Python versions.
  # We pin to CPU-only torch wheels to keep CI installs fast (no CUDA payload).
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install CPU-only torch
        # Pulling the default torch wheel drags in ~2GB of CUDA libs we don't
        # use. The CPU index serves a much slimmer build.
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<3.0"

      - name: Install project (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: pytest -ra --cov=imdb_gru --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Type-check: mypy --strict on the package (informational; non-blocking).
  # Strict typing is good hygiene, but recurrent-NN code interfaces with
  # third-party stubs that may lag; we keep it as a separate, non-failing job.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only torch
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<3.0"

      - name: Install project (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/imdb_gru
